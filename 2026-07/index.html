<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT事業部 売上管理ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#F7F7F5;color:#1A1A1A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.container{width:100%;max-width:640px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.logo-icon{width:44px;height:44px;background:#E8711A;border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:24px;height:24px;fill:#fff}
.logo-text{font-size:20px;font-weight:700}
.logo-sub{font-size:12px;color:#888;margin-top:2px}
.title{font-size:15px;font-weight:500;color:#555;margin-bottom:20px;letter-spacing:.02em}
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.month-card{background:#fff;border:1px solid #EBEBEA;border-radius:12px;padding:24px;cursor:pointer;text-decoration:none;display:block;transition:all .15s;position:relative;overflow:hidden}
.month-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:#E8711A}
.month-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.month-card.inactive::after{background:#CCC}
.month-card.inactive{opacity:.6;cursor:default;pointer-events:none}
.month-label{font-size:13px;color:#888;margin-bottom:6px}
.month-name{font-size:22px;font-weight:700;color:#1A1A1A;margin-bottom:8px}
.month-status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.status-active{background:#FFF4EC;color:#E8711A}
.status-done{background:#EDF7ED;color:#2E7D32}
.status-future{background:#F4F4F2;color:#888}
.month-meta{font-size:11px;color:#AAA;margin-top:8px}
.footer{margin-top:32px;font-size:11px;color:#BBB;text-align:center}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 3h18v2H3V3zm0 4h12v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2zm0 4h18v2H3v-2z"/></svg></div>
    <div>
      <div class="logo-text">PT事業部</div>
      <div class="logo-sub">売上管理システム | 株式会社ディグロス</div>
    </div>
  </div>

  <div class="title">月次ダッシュボード一覧</div>

  <div class="month-grid">
    <a href="./2026-05/" class="month-card">
      <div class="month-label">2026年</div>
      <div class="month-name">5月</div>
      <span class="month-status status-done">✅ 更新済み</span>
      <div class="month-meta">営業日数 18日</div>
    </a>
    <a href="./2026-07/" class="month-card">
      <div class="month-label">2026年</div>
      <div class="month-name">7月</div>
      <span class="month-status status-active">▶ 稼働中</span>
      <div class="month-meta">営業日数 23日</div>
    </a>
    <a href="./2026-06/" class="month-card">
      <div class="month-label">2026年</div>
      <div class="month-name">6月</div>
      <span class="month-status status-active">▶ 稼働中</span>
      <div class="month-meta">営業日数 22日</div>
    </a>
    <div class="month-card inactive">
      <div class="month-label">2026年</div>
      <div class="month-name">7月</div>
      <span class="month-status status-future">準備中</span>
      <div class="month-meta">—</div>
    </div>
    <div class="month-card inactive">
      <div class="month-label">2026年</div>
      <div class="month-name">8月</div>
      <span class="month-status status-future">準備中</span>
      <div class="month-meta">—</div>
    </div>
  </div>

  <div class="footer">最終更新: 2026/05/26　|　閲覧は社内限定でお願いします</div>
</div>
</body>
</html>
